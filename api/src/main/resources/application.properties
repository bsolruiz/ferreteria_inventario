spring.application.name=api

# ==========================================
# ConfiguraciÛn de base de datos MySQL
# ==========================================
spring.datasource.url=jdbc:mysql://localhost:3306/ferreteria_db?useSSL=false&serverTimezone=America/Bogota&allowPublicKeyRetrieval=true
spring.datasource.username=ferreteria_user
spring.datasource.password=ferreteria1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# ConfiguraciÛn JPA / Hibernate
# ==========================================

# create-drop: recrea las tablas cada vez que arranca (˙til en desarrollo)
# update:      actualiza el esquema sin borrar datos
# validate:    solo valida, no toca la BD (recomendado en producciÛn)
# none:        Hibernate no hace nada con el esquema
spring.jpa.hibernate.ddl-auto=create-drop

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect